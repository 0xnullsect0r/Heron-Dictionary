services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heron_backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/_health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      PORT: "3001"
      DATA_DIR: /data
      ADMIN_ENABLED: "true"
      ADMIN_PASSWORD: "heron-admin"
    volumes:
      - api_data:/data
    networks:
      - heron_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: heron_frontend
    restart: unless-stopped
    ports:
      - "8089:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - heron_network

volumes:
  api_data:
    driver: local

networks:
  heron_network:
    driver: bridge
